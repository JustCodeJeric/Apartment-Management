<body>

      import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
      import { getDatabase, ref, set, onValue } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

      const firebaseConfig = {
        apiKey: "AIzaSyAht_Y2CmD6EUAu-cb--r0pEStOdChfaD4",

        databaseURL: "https://apartment-rental-management-default-rtdb.asia-southeast1.firebasedatabase.app",

        appId: "1:18219888001:web:2eb940fb5dd6201aa90c80",
        measurementId: "G-Z7KWPSVKZG"
      };

      // Initialize Firebase
      const app = initializeApp(firebaseConfig);
      const db = getDatabase(app);

      window.dbRef = ref;
      window.dbSet = set;
      window.dbOnValue = onValue;

      console.log("Firebase initialized!");
